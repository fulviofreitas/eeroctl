# Delegates to the shared reusable workflow in fulviofreitas/workflow-arsenal.
# See the reusable workflow's inputs for how to customise per-repo behaviour.

name: Draft Fix

on:
  issues:
    types: [labeled]

concurrency:
  group: draft-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  draft-fix:
    if: >-
      github.event.label.name == 'try-fix' &&
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.state == 'open'
    uses: fulviofreitas/workflow-arsenal/.github/workflows/agentic-draft-fix.yml@master
    with:
      stack_description: 'standalone Click-based CLI on top of the eero-api SDK. Tests: pytest + CliRunner.'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      RENOVATE_APP_ID: ${{ secrets.RENOVATE_APP_ID }}
      RENOVATE_APP_PRIVATE_KEY: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
