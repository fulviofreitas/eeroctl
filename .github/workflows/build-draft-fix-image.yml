# Build the draft-fix runtime image and push to GHCR.
#
# Triggers:
#   - push to master that touches the Dockerfile or pyproject.toml
#   - weekly schedule (refresh transitive dep versions + base image)
#   - manual workflow_dispatch
#
# Image: ghcr.io/fulviofreitas/eeroctl-draft-fix:latest
# Consumed by .github/workflows/draft-fix.yml via the `container:` key.
#
# Security: only secrets.GITHUB_TOKEN used for registry auth. Per-run,
# repo-scoped — never a PAT.

name: Build Draft-Fix Image

on:
  push:
    branches: [master]
    paths:
      - '.github/docker/draft-fix.Dockerfile'
      - '.github/workflows/build-draft-fix-image.yml'
      - 'pyproject.toml'
  schedule:
    # Weekly Monday 08:00 UTC — refreshes base image + transitive deps.
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: build-draft-fix-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .github/docker/draft-fix.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/eeroctl-draft-fix:latest
            ghcr.io/${{ github.repository_owner }}/eeroctl-draft-fix:${{ github.sha }}
          cache-from: type=gha,scope=draft-fix
          cache-to: type=gha,scope=draft-fix,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Pre-baked tooling + deps for the draft-fix agent workflow on eeroctl.
            org.opencontainers.image.licenses=MIT
