# ============================================================================
# 🚀 Release + Publish Pipeline
# ============================================================================
# Chain: CI → Release → TestPyPI → PyPI (approval) → Homebrew
#
# Automatically creates releases based on conventional commit messages,
# publishes to PyPI, and updates Homebrew tap.
#
# Reusable actions from: fulviofreitas/workflow-arsenal/.github/actions/
# ============================================================================

name: 🚀 Release

on:
  # Trigger after CI workflow completes successfully
  workflow_run:
    workflows: ["🧪 CI Pipeline"]
    types: [completed]
    branches: [master]
  # Allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      dry_run:
        description: "🧪 Dry-run mode (no actual release)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write  # Required for PyPI Trusted Publishing

jobs:
  # ============================================================================
  # 🚀 Semantic Release
  # ============================================================================
  release:
    name: 🚀 Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run if CI passed (or manual trigger) and not a release commit
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
       !contains(github.event.workflow_run.head_commit.message, 'chore(release)'))

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🚀 Run semantic-release
        id: release
        uses: fulviofreitas/workflow-arsenal/.github/actions/semantic-release@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}

  # ============================================================================
  # 📦 Publish to TestPyPI (validation step)
  # ============================================================================
  publish-testpypi:
    name: 📦 Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: release
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 10

    environment:
      name: testpypi
      url: https://test.pypi.org/project/eeroctl/

    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: 🏷️ Create dev version
        id: version
        run: |
          DEV_VERSION="${{ needs.release.outputs.version }}.dev0"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT

          # Update pyproject.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"${DEV_VERSION}\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \"[^\"]*\"/__version__ = \"${DEV_VERSION}\"/" src/eeroctl/__init__.py

          echo "📦 TestPyPI version: ${DEV_VERSION}"

      - name: 📦 Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🏗️ Build package
        run: python -m build

      - name: 🔍 Validate package
        run: twine check dist/*

      - name: 📤 Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false
          verbose: true

  # ============================================================================
  # 📦 Publish to PyPI (requires approval)
  # ============================================================================
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release, publish-testpypi]
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 10

    environment:
      name: pypi
      url: https://pypi.org/project/eeroctl/

    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: 📦 Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🏗️ Build package
        run: python -m build

      - name: 🔍 Validate package
        run: twine check dist/*

      - name: 📤 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          verbose: true

  # ============================================================================
  # 🍺 Update Homebrew Tap
  # ============================================================================
  update-homebrew:
    name: 🍺 Update Homebrew
    runs-on: ubuntu-latest
    needs: [release, publish-pypi]
    if: |
      success() &&
      needs.release.outputs.released == 'true' &&
      needs.release.outputs.version != '' &&
      github.event.inputs.dry_run != 'true'
    timeout-minutes: 5

    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: fulviofreitas
          repositories: homebrew-eeroctl

      - name: 🍺 Trigger formula update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: fulviofreitas/homebrew-eeroctl
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ needs.release.outputs.version }}",
              "package": "eeroctl"
            }

      - name: 📝 Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🍺 Homebrew Update Triggered

          | Property | Value |
          |:---------|:------|
          | 📦 Package | \`eeroctl\` |
          | 🏷️ Version | \`v${{ needs.release.outputs.version }}\` |
          | 🎯 Repository | \`fulviofreitas/homebrew-eeroctl\` |

          The Homebrew tap will be updated automatically.

          ### 📥 Installation

          \`\`\`bash
          brew install fulviofreitas/eeroctl/eeroctl
          \`\`\`
          EOF
